<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>瑞行天下泰国核价系统</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="hero-banner">
      <div class="hero-overlay">
        <div class="hero-elephant">🐘</div>
        <div class="hero-title-wrap">
          <h1 class="page-title">瑞行天下泰国核价系统</h1>
          <div class="page-subtitle">专业 · 高效 · 透明</div>
        </div>
      </div>
    </header>

    <div class="main-grid">
      <div class="left-column">
        <section class="card">
          <h2>1. 选择车型与基本信息</h2>

          <div class="basic-grid">
            <div>
              <label>车型</label>
              <select id="carType"></select>
            </div>

            <div>
              <label>人数</label>
              <input id="passengerCount" type="number" min="1" value="2" />
            </div>

            <div>
              <label>日期 <span class="red-text">（选填）</span></label>
              <input id="globalDate" class="date-picker" type="date" />
              <div class="red-text small-text">节假日用车必选</div>
            </div>
          </div>

          <div class="vehicle-layout">
            <div class="vehicle-photo-box">
              <img id="vehicleMainImage" class="vehicle-main-image" src="" alt="车型图片" />
              <a id="downloadVehicleImage" class="download-btn" href="#" download>下载车型图片</a>
            </div>

            <div class="vehicle-info-box">
              <h3 id="vehicleTitle"></h3>

              <div class="info-pill-row">
                <div class="info-pill">
                  <div class="pill-label">建议乘坐</div>
                  <div class="pill-value" id="vehicleSeatAdvice"></div>
                </div>
                <div class="info-pill">
                  <div class="pill-label">建议行李</div>
                  <div class="pill-value" id="vehicleLuggageAdvice"></div>
                </div>
              </div>

              <div class="vehicle-text" id="vehicleLuggageSize"></div>

              <div class="vehicle-scene-title">适合场景</div>
              <ul class="scene-list" id="vehicleScenes"></ul>

              <div id="vehicleWarningBox" class="warning-box"></div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-header">
            <h2>2. 行程信息</h2>
            <button type="button" class="add-btn" id="addTripBtn">+ 添加行程</button>
          </div>
          <div id="tripList"></div>
        </section>

        <section class="card">
          <div class="section-header">
            <h2>3. 门票信息</h2>
            <button type="button" class="add-btn" id="addTicketBtn">+ 添加门票</button>
          </div>
          <div id="ticketList"></div>
        </section>
      </div>

      <div class="right-column">
        <div id="quoteCaptureArea">
          <section class="card">
            <div class="panel-title">当前选择概览</div>
            <div class="overview-body">
              <img id="overviewImage" class="overview-image" src="" alt="当前车型" />

              <div class="overview-row">
                <span>车型</span>
                <strong id="overviewCar"></strong>
              </div>
              <div class="overview-row">
                <span>人数</span>
                <strong id="overviewPassengers"></strong>
              </div>
              <div class="overview-row">
                <span>日期</span>
                <strong id="overviewDate"></strong>
              </div>
              <div class="overview-row">
                <span>建议乘坐</span>
                <strong id="overviewSeatAdvice"></strong>
              </div>
              <div class="overview-row">
                <span>建议行李</span>
                <strong id="overviewLuggageAdvice"></strong>
              </div>
              <div class="overview-row">
                <span>行李参考</span>
                <strong id="overviewLuggageSize"></strong>
              </div>

              <div id="overviewStatusBox" class="status-box"></div>

              <div class="overview-subsection">
                <div class="overview-subtitle">行程摘要</div>
                <div id="overviewTripSummary" class="summary-list muted"></div>
              </div>

              <div class="overview-subsection">
                <div class="overview-subtitle">门票摘要</div>
                <div id="overviewTicketSummary" class="summary-list muted"></div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="panel-title">报价结果</div>
            <div class="result-body">
              <div id="tripResultDetail"></div>
              <div id="ticketResultDetail"></div>

              <div class="result-sum-row">
                <span>用车费用小计</span>
                <strong id="tripSubtotal">0 THB</strong>
              </div>
              <div class="result-sum-row">
                <span>门票费用小计</span>
                <strong id="ticketSubtotal">0 THB</strong>
              </div>
              <div class="result-total-row">
                <span>总价</span>
                <strong id="grandTotal">0 THB</strong>
              </div>

              <div class="action-row">
                <button type="button" class="copy-btn" id="copyQuoteBtn">复制报价图片</button>
              </div>

              <div class="notice-box" id="finalNoticeBox"></div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
