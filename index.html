<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>瑞行天下泰国核价系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>瑞行天下泰国核价系统</h1>

    <div class="main-layout">
      <div class="left-panel">
        <div class="card">
          <h2>行程信息</h2>

          <div class="top-grid">
            <div>
              <label>车型</label>
              <select id="carType" onchange="updateCarInfo(); refreshAllTripFields(); calculatePrice();">
                <option value="sedan">5座轿车</option>
                <option value="suv7">7座SUV</option>
                <option value="v9">V9面包车</option>
                <option value="v8">V8面包车</option>
                <option value="alphard">阿尔法</option>
              </select>
            </div>

            <div>
              <label>人数</label>
              <input type="number" id="passengerCount" min="1" value="2" oninput="updateCarInfo(); calculatePrice();" />
            </div>

            <div>
              <label>日期 <span class="red-small">（选填）</span></label>
              <input type="date" id="globalDate" onchange="calculatePrice()" />
              <div class="red-tip">节假日用车必选</div>
            </div>
          </div>

          <div class="car-preview-box">
            <div class="car-preview-left">
              <img id="carPreview" src="images/sedan-1.jpg" alt="车型预览" />
            </div>
            <div class="car-preview-right">
              <h3 id="carTitle">5座轿车</h3>
              <p id="carRule">建议 2-3人 + 3件行李</p>
              <p id="carLuggage">行李参考：20-26寸</p>
              <p id="carWarning" class="warning-text"></p>
              <a id="downloadImage" href="images/sedan-1.jpg" download class="download-btn">下载车型图片</a>
            </div>
          </div>

          <div id="tripList"></div>

          <button type="button" onclick="addTrip()">+ 添加行程</button>
        </div>
      </div>

      <div class="right-panel">
        <div class="card result">
          <h2>核价结果</h2>
          <div id="resultDetail"></div>
          <div id="finalNotice" class="final-notice"></div>
          <h3 id="totalPrice">总价：0 THB</h3>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
